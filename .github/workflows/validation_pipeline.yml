name: Validation Pipeline
on:
  pull_request:
    branches: [ main ]
  merge_group:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  validation:
    name: Fix and Validate Code
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          persist-credentials: false

      - name: Determine Go version
        id: go-version
        run: |
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          if [ -z "$GO_VERSION" ]; then
            echo "Unable to determine Go version from go.mod" >&2
            exit 1
          fi
          GO_VERSION="$GO_VERSION" python3 .github/scripts/resolve_go_version.py

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          install-mode: goinstall
          install-only: true

      - name: Install license-eye
        run: |
          # renovate: datasource=go depName=github.com/apache/skywalking-eyes versioning=semver
          go install github.com/apache/skywalking-eyes/cmd/license-eye@v0.8.0

      - name: Apply Go Formatting
        run: |
          # renovate: datasource=go depName=golang.org/x/tools versioning=semver
          go install golang.org/x/tools/cmd/goimports@v0.48.0
          gofmt -w .
          goimports -local github.com/pjscruggs/slogcp-grpc-adapter -w .

      - name: Ensure module metadata is tidy
        run: go mod tidy

      - name: Sync example Go directives
        run: python3 .github/scripts/sync_example_go_versions.py

      - name: Get current year in US Central Time
        id: year
        run: |
          YEAR=$(TZ='America/Chicago' date +%Y)
          echo "YEAR=$YEAR" >> $GITHUB_OUTPUT

      - name: Update license year in config
        run: |
          sed -i 's/copyright-year: .*/copyright-year: "2025-${{ steps.year.outputs.YEAR }}"/g' .licenserc.yaml
          echo "Updated year to 2025-${{ steps.year.outputs.YEAR }}"

      - name: Fix License Headers
        run: license-eye -v info -c .licenserc.yaml header fix

      - name: Apply Lint Fixes
        run: golangci-lint run --fix --timeout=5m ./...
        continue-on-error: true

      - name: Ensure working tree is clean
        run: |
          if git diff --quiet; then
            exit 0
          fi

          echo "Working tree has uncommitted changes after maintenance steps."
          git status --short
          exit 1

      - name: Verify Linting
        run: golangci-lint run --timeout=5m ./...

      - name: Verify License Headers
        run: license-eye -v info -c .licenserc.yaml header check

      - name: Verify example Go directives
        run: python3 .github/scripts/sync_example_go_versions.py --check

      - name: Verify Renovate Policy
        run: python3 .github/scripts/test_renovate_policy.py

      - name: Install Go Test Tools
        run: |
          # renovate: datasource=go depName=github.com/mfridman/tparse versioning=semver
          go install github.com/mfridman/tparse@v0.18.0

      - name: Run Go Tests
        if: success()
        id: go-tests
        run: |
          go test -json -race -coverprofile=coverage.out ./... | tparse -all -notests

      - name: Verify Example Modules
        if: success()
        run: |
          set -euo pipefail
          if [ ! -d ".examples" ]; then
            echo "No .examples directory found; skipping example verification."
            exit 0
          fi

          examples_found=0
          while IFS= read -r -d '' mod; do
            examples_found=1
            dir=$(dirname "$mod")
            echo "::group::go test $dir"
            (cd "$dir" && go test ./...)
            echo "::endgroup::"
          done < <(find .examples -name go.mod -print0)

          if [ "$examples_found" -eq 0 ]; then
            echo "No example go.mod files found under .examples; skipping."
          fi

      - name: Print Coverage Report
        if: always()
        run: |
          echo "--- Test Coverage ---"
          if [ -f coverage.out ]; then
            cat coverage.out
          else
            echo "Coverage file (coverage.out) not found."
          fi
          echo "---------------------"

      - name: Run Vulnerability Check
        run: |
          echo "Installing govulncheck..."
          # renovate: datasource=go depName=golang.org/x/vuln versioning=semver
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          echo "Running vulnerability check..."
          govulncheck ./...

  adapter_local_validation_policy:
    name: Adapter Local Validation Policy
    needs:
      - validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate adapter local validation result
        shell: bash
        env:
          VALIDATION_RESULT: ${{ needs.validation.result }}
        run: |
          set -euo pipefail

          if [[ "$VALIDATION_RESULT" == "success" ]]; then
            echo "Adapter validation passed."
            exit 0
          fi

          echo "Adapter validation result: $VALIDATION_RESULT"
          exit 1
