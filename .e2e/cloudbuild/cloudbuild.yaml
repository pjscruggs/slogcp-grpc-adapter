timeout: 1200s

substitutions:
  _GO_VERSION: "1.26.2"
  _REF: "main"
  _REPO_URL: "https://github.com/pjscruggs/slogcp-grpc-adapter.git"

steps:
  - id: checkout
    name: gcr.io/cloud-builders/git
    args:
      - clone
      - --filter=blob:none
      - "${_REPO_URL}"
      - /workspace/source

  - id: checkout-ref
    name: gcr.io/cloud-builders/git
    dir: /workspace/source
    args:
      - checkout
      - "${_REF}"

  - id: adapter-e2e-test
    name: "golang:${_GO_VERSION}"
    dir: /workspace/source/.e2e
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        go test -race ./...

options:
  logging: CLOUD_LOGGING_ONLY
